[package]
name = "ragrig"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
clap = { version = "4.0", features = ["derive", "env"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures-util = "0.3"
walkdir = "2.4"
pdf-extract = "0.7"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
epub-parser = "0.3.4"
chunkedrs = "1.0"
rig-core = { version = "0.38", features = ["rayon"] }
rustyline = "15.0"
